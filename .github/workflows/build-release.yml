name: Build and Release Tatoeba DaDb

on:
  schedule:
    - cron: "0 4 * * 1" # Every Monday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Build all DaDb dictionaries (without tags)
        run: |
          # Deliberately omit --include-tags so noisy Tatoeba tags are excluded.
          uv run tatoeba_to_dadb.py --delete-unzipped

      - name: Verify output exists
        run: |
          shopt -s nullglob
          files=(out/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files were generated in out/."
            exit 1
          fi
          printf 'Generated files:\n%s\n' "${files[*]}"

      - name: Extract index files for update checks
        run: python3 .github/extract_indexes.py

      - name: Compute release date
        id: release_date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Delete existing same-day release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_date.outputs.value }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Deleting existing release $TAG..."
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes
            # The git tag may not exist if the previous run failed early; ignore the error.
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" 2>/dev/null || true
          else
            echo "No existing release for $TAG, nothing to delete."
          fi

      - name: Create GitHub release (dict zips)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_date.outputs.value }}
          name: Tatoeba DaDb ${{ steps.release_date.outputs.value }}
          files: out/*.zip
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true

      - name: Upload index files (batched to avoid rate limits)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_date.outputs.value }}"
          BATCH=20
          count=0
          for f in out/indexes/index_*.json; do
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber
            count=$((count + 1))
            if [ $((count % BATCH)) -eq 0 ]; then
              echo "Uploaded $count files, pausing to respect rate limits..."
              sleep 10
            fi
          done
          echo "Done uploading $count index file(s)."

name: Build and Release Tatoeba DaDb

on:
  schedule:
    - cron: "0 4 * * 1" # Every Monday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Build all DaDb example dictionaries
        run: |
          # Deliberately omit --include-tags so noisy Tatoeba tags are excluded.
          uv run tatoeba_to_dadb.py --delete-unzipped

      - name: Verify output exists
        run: |
          shopt -s nullglob
          files=(out/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files were generated in out/."
            exit 1
          fi
          printf 'Generated files:\n%s\n' "${files[*]}"

      - name: Extract index files for update checks
        run: python3 .github/extract_indexes.py

      - name: Generate release notes
        run: python3 .github/generate_release_notes.py

      - name: Commit updated LANGUAGES.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LANGUAGES.md
          git diff --cached --quiet || git commit -m "chore: update LANGUAGES.md [skip ci]"
          git push

      - name: Compute release date
        id: release_date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Delete existing same-day release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_date.outputs.value }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Deleting existing release $TAG..."
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes
            # The git tag may not exist if the previous run failed early; ignore the error.
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" 2>/dev/null || true
          else
            echo "No existing release for $TAG, nothing to delete."
          fi

      - name: Create GitHub release (empty, no assets yet)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_date.outputs.value }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.release_date.outputs.value }}" \
            --notes-file out/release_notes.md \
            --latest

      - name: Upload dict zips and index files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.release_date.outputs.value }}"
          mapfile -d '' files < <(find out -maxdepth 1 -name '*.zip' -print0; find out/indexes -name 'index_*.json' -print0)
          total=${#files[@]}
          echo "Uploading $total file(s)..."
          for ((i=0; i<total; i++)); do
            f="${files[i]}"
            echo "  [$((i+1))/$total] $(basename "$f")"
            for ((attempt=1; attempt<=10; attempt++)); do
              if err=$(gh release upload "$TAG" "$f" \
                        --repo "${{ github.repository }}" --clobber 2>&1); then
                break
              fi
              if echo "$err" | grep -qi "rate limit\|403\|429"; then
                # Honour retry-after if gh surfaces it, otherwise 60s (docs minimum)
                wait=60
                if ra=$(echo "$err" | grep -oP '(?i)retry.?after[: ]+\K[0-9]+'); then
                  wait="$ra"
                fi
                echo "    Rate limited (attempt $attempt/10), waiting ${wait}s..."
                sleep "$wait"
              else
                echo "    Error: $err"
                [[ $attempt -eq 10 ]] && exit 1
                sleep 5
              fi
            done
            # 1s gap between uploads → ~60 req/min, safely under the 80/min content-creation limit
            (( i + 1 < total )) && sleep 1
          done
          echo "Done."

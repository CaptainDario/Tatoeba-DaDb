name: Build and Release Tatoeba DaDb

on:
  schedule:
    - cron: "0 4 * * 1" # Every Monday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Full top-25 release ──────────────────────────────────────────────────────
  build-and-full-release:
    runs-on: ubuntu-latest
    outputs:
      release_date: ${{ steps.release_date.outputs.value }}
      top25_langs: ${{ steps.top25_langs.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Compute release date
        id: release_date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build top-25 DaDb example dictionaries
        run: |
          # Deliberately omit --include-tags so noisy Tatoeba tags are excluded.
          uv run tatoeba_to_dadb.py --top 25 --delete-unzipped

      - name: Verify output exists (full)
        run: |
          shopt -s nullglob
          files=(out/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files were generated in out/."
            exit 1
          fi
          printf 'Generated files:\n%s\n' "${files[*]}"

      - name: Extract index files for update checks
        run: python3 .github/extract_indexes.py

      - name: Generate release notes
        run: python3 .github/generate_release_notes.py --tag "${{ steps.release_date.outputs.value }}"

      - name: Commit updated LANGUAGES.md and stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LANGUAGES.md stats/
          git diff --cached --quiet || git commit -m "chore: update LANGUAGES.md and stats [skip ci]"
          git push

      - name: Create full release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_date.outputs.value }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists (same day) — replacing."
            gh release delete "$TAG" --cleanup-tag --repo "${{ github.repository }}" --yes
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes-file out/release_notes.md \
            --latest

      - name: Upload full release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/upload_assets.py \
            "${{ steps.release_date.outputs.value }}" \
            "${{ github.repository }}"

      - name: Save top-25 language list from stats
        id: top25_langs
        run: |
          langs=$(python3 - <<'EOF'
          import json, pathlib
          counts = json.loads(pathlib.Path("out/stats.json").read_text())
          ranked = sorted(counts, key=counts.__getitem__, reverse=True)[:25]
          print(" ".join(ranked))
          EOF
          )
          echo "value=$langs" >> "$GITHUB_OUTPUT"

  # ── Filtered releases (jpn, zho, kor) — run in parallel ─────────────────────
  filtered-release:
    needs: build-and-full-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        main_lang: [jpn, cmn, kor]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Build and release filtered dict (main=${{ matrix.main_lang }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_DATE="${{ needs.build-and-full-release.outputs.release_date }}"
          TOP25="${{ needs.build-and-full-release.outputs.top25_langs }}"
          MAIN_LANG="${{ matrix.main_lang }}"

          echo "══ Building main-${MAIN_LANG} release ══"

          uv run tatoeba_to_dadb.py \
            --langs $TOP25 \
            --main "$MAIN_LANG" \
            --delete-unzipped

          shopt -s nullglob
          files=(out/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files generated for main-${MAIN_LANG}."
            exit 1
          fi
          printf 'Generated files:\n%s\n' "${files[*]}"

          python3 .github/extract_indexes.py
          python3 .github/generate_release_notes.py --main-lang "${MAIN_LANG}" --tag "${TAG_DATE}-main-${MAIN_LANG}"

          TAG="${TAG_DATE}-main-${MAIN_LANG}"

          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists (same day) — replacing."
            gh release delete "$TAG" --cleanup-tag --repo "${{ github.repository }}" --yes
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "${TAG_DATE} (main: ${MAIN_LANG})" \
            --notes-file out/release_notes.md \
            --latest=false

          python3 .github/upload_assets.py "$TAG" "${{ github.repository }}"

      - name: Commit stats file for filtered release
        run: |
          TAG_DATE="${{ needs.build-and-full-release.outputs.release_date }}"
          MAIN_LANG="${{ matrix.main_lang }}"
          TAG="${TAG_DATE}-main-${MAIN_LANG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          if ! git diff --cached --quiet; then
            git commit -m "chore: add stats for ${TAG} [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying in $((i * 5))s..."
              sleep $((i * 5))
            done
          fi

      - name: Update stable latest tag (latest-main-${{ matrix.main_lang }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STABLE_TAG="latest-main-${{ matrix.main_lang }}"
          COMMIT_SHA=$(git rev-parse HEAD)
          # --cleanup-tag atomically removes both the release object and its git tag,
          # ensuring the subsequent create actually moves the tag to the new commit.
          gh release delete "$STABLE_TAG" --cleanup-tag --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$STABLE_TAG" \
            --repo "${{ github.repository }}" \
            --title "Latest (main: ${{ matrix.main_lang }})" \
            --notes-file out/release_notes.md \
            --target "$COMMIT_SHA" \
            --latest=false
          python3 .github/upload_assets.py "$STABLE_TAG" "${{ github.repository }}"

name: Build and Release Tatoeba DaDb

on:
  schedule:
    - cron: "0 4 * * 1" # Every Monday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Compute release date
        id: release_date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # ── Full top-25 release ──────────────────────────────────────────────────

      - name: Build top-25 DaDb example dictionaries
        run: |
          # Deliberately omit --include-tags so noisy Tatoeba tags are excluded.
          uv run tatoeba_to_dadb.py --top 25 --delete-unzipped

      - name: Verify output exists (full)
        run: |
          shopt -s nullglob
          files=(out/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files were generated in out/."
            exit 1
          fi
          printf 'Generated files:\n%s\n' "${files[*]}"

      - name: Extract index files for update checks
        run: python3 .github/extract_indexes.py

      - name: Generate release notes
        run: python3 .github/generate_release_notes.py

      - name: Commit updated LANGUAGES.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LANGUAGES.md
          git diff --cached --quiet || git commit -m "chore: update LANGUAGES.md [skip ci]"
          git push

      - name: Delete existing same-day release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_date.outputs.value }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Deleting existing release $TAG..."
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" 2>/dev/null || true
          else
            echo "No existing release for $TAG, nothing to delete."
          fi

      - name: Create full release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_date.outputs.value }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.release_date.outputs.value }}" \
            --notes-file out/release_notes.md \
            --latest

      - name: Upload full release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/upload_assets.py \
            "${{ steps.release_date.outputs.value }}" \
            "${{ github.repository }}"

      # ── jpn-filtered top-25 release ─────────────────────────────────────────

      - name: Save top-25 language list from stats
        id: top25_langs
        run: |
          langs=$(python3 - <<'EOF'
          import json, pathlib
          counts = json.loads(pathlib.Path("out/stats.json").read_text())
          ranked = sorted(counts, key=counts.__getitem__, reverse=True)[:25]
          print(" ".join(ranked))
          EOF
          )
          echo "value=$langs" >> "$GITHUB_OUTPUT"

      - name: Clear output directory for jpn-filtered build
        run: rm -rf out/

      - name: Build jpn-filtered top-25 dictionaries
        run: |
          uv run tatoeba_to_dadb.py \
            --langs ${{ steps.top25_langs.outputs.value }} \
            --main jpn \
            --delete-unzipped

      - name: Verify output exists (jpn-filtered)
        run: |
          shopt -s nullglob
          files=(out/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files were generated in out/."
            exit 1
          fi
          printf 'Generated files:\n%s\n' "${files[*]}"

      - name: Extract index files for jpn-filtered release
        run: python3 .github/extract_indexes.py

      - name: Generate release notes for jpn-filtered release
        run: python3 .github/generate_release_notes.py

      - name: Delete existing same-day jpn release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_date.outputs.value }}-main-jpn"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Deleting existing release $TAG..."
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" 2>/dev/null || true
          else
            echo "No existing release for $TAG, nothing to delete."
          fi

      - name: Create jpn-filtered release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_date.outputs.value }}-main-jpn" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.release_date.outputs.value }} (main: jpn)" \
            --notes-file out/release_notes.md \
            --latest=false

      - name: Upload jpn-filtered release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/upload_assets.py \
            "${{ steps.release_date.outputs.value }}-main-jpn" \
            "${{ github.repository }}"
